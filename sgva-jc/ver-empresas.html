<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGVA - Ver Empresas</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2 class="h2-sidebar"><i class="fa-solid fa-briefcase"></i>SGVA</h2>
            <ul>
                <li onclick="window.location.href='index.html'">
                    <i class="fa-regular fa-pen-to-square"></i>Registrar
                </li>
                <li class="active">
                    <i class="fa-solid fa-list"></i>Ver empresas
                </li>
            </ul>
        </div>
        <div class="content">
            <nav class="nav">
                <h2 id="nav-h2">Ver empresas</h2>
                <p>Listado de todas las empresas registradas en el sistema.</p>
            </nav>
            <div class="content-c">

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <span class="stat-number" id="totalEmpresas">0</span>
            <span class="stat-label">Total empresas</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="totalPendiente">0</span>
            <span class="stat-label">Pendientes</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="totalLlamado">0</span>
            <span class="stat-label">Llamados</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="totalDescartado">0</span>
            <span class="stat-label">Descartados</span>
        </div>
    </div>

    <!-- Controles -->
    <div class="table-controls">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="buscador" placeholder="Buscar empresa, contacto, correo...">
        </div>
        <div class="filter-group">
            <select id="filtroEstado">
                <option value="">Todos los estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="llamado">Llamado</option>
                <option value="contactado">Contactado</option>
                <option value="descartado">Descartado</option>
            </select>
        </div>
        <span class="results-count" id="resultadosCount"></span>
    </div>

    <!-- Tabla -->
    <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Empresa</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>Contacto</th>
                        <th>Dirección</th>
                        <th>Fecha inicio</th>
                        <th>Fecha fin</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaEmpresas">
                </tbody>
            </table>
        </div>

    </div>
        </div>
    </div>
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/ver-empresas.js"></script>
</body>
</html>
