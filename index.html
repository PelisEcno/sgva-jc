<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGVA - ADSO</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2 class="h2-sidebar"><i class="fa-solid fa-briefcase"></i>SGVA</h2>
            <ul>
                <li class="active">
                    <i class="fa-regular fa-pen-to-square"></i>Registrar
                </li>
                <li onclick="window.location.href='ver-empresas.html'">
                    <i class="fa-solid fa-list"></i>Ver empresas
                </li>
            </ul>
        </div>
        <div class="content">
            <nav class="nav">
                <h2 id="nav-h2">Gestion de empresas SGVA</h2>
                <p>Controla imformacin, contactos, estados y datos principales de las empresas.</p>
            </nav>
            <div class="content-c">
                <div class="card_target">
                    <form id="formAdso">

                        <h3>Información de la empresa</h3>

                        <label>Nombre de la empresa</label>
                        <input type="text" id="nombre_empresa">

                        <label>Teléfono</label>
                        <input type="text" id="telefono">

                        <label>Correo electrónico</label>
                        <input type="email" id="email">

                        <label>Persona de contacto</label>
                        <input type="text" id="persona_contacto">

                        <label>Dirección</label>
                        <input type="text" id="direccion">

                        <h3>Fechas</h3>

                        <div class="row">
                            <div>
                                <label>Fecha inicio</label>
                                <input type="date" id="fecha_inicio">
                            </div>
                            <div>
                                <label>Fecha fin</label>
                                <input type="date" id="fecha_fin">
                            </div>
                        </div>

                        <label>Estado</label>
                        <select id="estado">
                            <option>pendiente</option>
                            <option>contactado</option>
                            <option>descartado</option>
                            <option>llamado</option>
                        </select>

                        <div class="buttons">
                            <button type="reset">Limpiar</button>
                            <button type="submit">Guardar empresa</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/firebase-config.js"></script>
<script type="module" src="./js/app.js"></script>

</body>
</html>
